name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm preflight
      - run: pnpm build
      - name: Stage artifact
        run: |
          mkdir -p out
          cp dist/cli.js out/streeteasy
          chmod +x out/streeteasy
          (cd out && shasum -a 256 streeteasy > SHA256SUMS)
          cat out/SHA256SUMS
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            out/streeteasy \
            out/SHA256SUMS
